<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="/static/responsive.css"/>
  <title>Chat — Paper Trading</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; max-width: 100%; overflow-x: hidden; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0;
           display: flex; flex-direction: column; }

    header { background: #1a1d27; border-bottom: 1px solid #2d3148;
             padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    header h1 { font-size: 1.2rem; font-weight: 800; color: #7c85ff; }
    .hdr-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .btn-sm { padding: 6px 14px; border: none; border-radius: 6px; font-size: 0.8rem;
              font-weight: 600; cursor: pointer; background: #2d3148; color: #94a3b8;
              transition: opacity .15s; text-decoration: none; display: inline-block; }
    .btn-sm:hover { opacity: .85; }

    .chat-wrap {
      flex: 1; display: grid; grid-template-columns: 320px minmax(0, 1fr);
      max-width: 1200px; width: 100%; margin: 0 auto; padding: 20px; gap: 20px; min-height: 0;
    }

    .sidebar { background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px;
               display: flex; flex-direction: column; min-height: 0; min-width: 0; }
    .sidebar h2 { font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
                  letter-spacing: .08em; color: #64748b; padding: 16px 18px 10px; }

    .search-row { padding: 0 14px 12px; position: relative; }
    .search-row input { width: 100%; background: #13151f; border: 1px solid #2d3148;
                        border-radius: 7px; color: #e2e8f0; padding: 9px 12px; font-size: 0.85rem;
                        outline: none; }
    .search-row input:focus { border-color: #7c85ff; }
    .search-results {
      position: absolute; top: 44px; left: 14px; right: 14px;
      background: #13151f; border: 1px solid #2d3148; border-radius: 7px;
      max-height: 200px; overflow-y: auto; z-index: 10; display: none;
    }
    .search-results.open { display: block; }
    .search-results div { padding: 8px 12px; cursor: pointer; font-size: 0.85rem; }
    .search-results div:hover { background: #2d3148; }

    .convo-list { flex: 1; overflow-y: auto; }
    .convo {
      padding: 12px 16px; border-bottom: 1px solid #1e2130; cursor: pointer;
      display: flex; gap: 12px; align-items: center; transition: background .12s;
    }
    .convo:hover  { background: #1e2130; }
    .convo.active { background: #2d3148; }
    .avatar {
      width: 38px; height: 38px; border-radius: 50%; background: #4f46e5; color: #fff;
      display: flex; align-items: center; justify-content: center; font-weight: 800;
      font-size: 1rem; flex-shrink: 0;
    }
    .convo-meta { flex: 1; min-width: 0; }
    .convo-name { font-weight: 700; font-size: 0.92rem; display: flex; justify-content: space-between; align-items: center; }
    .convo-time { font-size: 0.7rem; color: #64748b; font-weight: 400; }
    .convo-preview { font-size: 0.8rem; color: #94a3b8;
                     white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .unread-dot {
      background: #f87171; color: #fff; border-radius: 11px; padding: 1px 7px;
      font-size: 0.7rem; font-weight: 700; margin-left: 6px;
    }

    .panel { background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px;
             display: flex; flex-direction: column; min-height: 0; min-width: 0; overflow: hidden; }
    .panel-header {
      padding: 14px 20px; border-bottom: 1px solid #2d3148;
      display: flex; align-items: center; gap: 14px; min-width: 0; flex-wrap: wrap;
    }
    .panel-header > div { min-width: 0; flex: 1; }
    .panel-header a { color: #7c85ff; text-decoration: none; font-weight: 700; }
    .panel-header a:hover { text-decoration: underline; }

    .messages { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 18px 22px;
                display: flex; flex-direction: column; gap: 8px; min-width: 0; }
    .msg {
      max-width: 75%; padding: 9px 14px; border-radius: 16px; font-size: 0.92rem;
      line-height: 1.4; word-wrap: break-word; overflow-wrap: anywhere;
    }
    .msg.them { background: #2d3148; color: #e2e8f0; align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg.me   { background: #7c85ff; color: #fff;     align-self: flex-end;   border-bottom-right-radius: 4px; }
    .msg-time { font-size: 0.65rem; color: #475569; margin-top: 2px; padding: 0 4px; }
    .msg-time.me { align-self: flex-end; }
    .msg-time.them { align-self: flex-start; }

    .composer {
      padding: 14px 18px; border-top: 1px solid #2d3148;
      display: flex; gap: 10px; min-width: 0; flex-shrink: 0;
    }
    .composer input {
      flex: 1; min-width: 0; background: #13151f; border: 1px solid #2d3148; border-radius: 22px;
      padding: 12px 16px; color: #e2e8f0; font-size: 1rem; outline: none;
    }
    .composer input:focus { border-color: #7c85ff; }
    .composer button {
      background: #7c85ff; color: #fff; border: none; border-radius: 22px;
      padding: 10px 22px; font-weight: 700; cursor: pointer; font-size: 0.9rem;
      transition: opacity .15s; flex-shrink: 0;
    }
    .composer button:hover { opacity: .85; }
    .composer button:disabled { opacity: .4; cursor: not-allowed; }

    .empty-pane {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: #475569; font-size: 0.95rem; text-align: center; padding: 40px;
    }

    @media (max-width: 720px) {
      header { padding: 10px 14px; }
      header h1 { font-size: 1rem; }

      .chat-wrap {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr);
        padding: 10px; gap: 10px;
        height: calc(100dvh - 56px);
        min-height: 0;
      }

      /* Sidebar collapses when a chat is open so the chat box dominates the screen */
      .sidebar { max-height: 38vh; }
      body.chat-open .sidebar { max-height: 110px; overflow: hidden; }
      body.chat-open .sidebar h2 { display: none; }
      body.chat-open .convo-list { display: none; }

      /* Bigger, more prominent chat panel + composer */
      .panel { min-height: 60vh; }
      .messages { padding: 14px 14px; }
      .panel-header { padding: 10px 14px; gap: 10px; }
      .composer { padding: 10px 12px; gap: 8px; }
      .composer input { padding: 14px 16px; font-size: 1.05rem; }
      .composer button { padding: 12px 18px; font-size: 0.95rem; }

      .msg { max-width: 85%; font-size: 1rem; }

      .search-row input { padding: 11px 12px; font-size: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>💬 Chat</h1>
  <div class="hdr-right">
    <span style="font-size:.85rem;color:#64748b">{{ username }}</span>
    {% if is_admin %}<a href="/admin" class="btn-sm" style="background:#78350f;color:#fcd34d">Admin</a>{% endif %}
    <a href="/" class="btn-sm">Portfolio</a>
    <a href="/market" class="btn-sm">Markets</a>
    <a href="/items" class="btn-sm">🎒 Items</a>
    <a href="/account" class="btn-sm">Account</a>
    <button class="btn-sm" onclick="logout()">Logout</button>
  </div>
</header>

<div class="chat-wrap">
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Conversations</h2>
    <div class="search-row">
      <input id="user-search" type="text" placeholder="🔍 Find a user…" autocomplete="off"/>
      <div class="search-results" id="search-results"></div>
    </div>
    <div class="convo-list" id="convo-list">
      <div class="empty-pane" style="padding: 30px 20px">Loading…</div>
    </div>
  </div>

  <!-- Chat panel -->
  <div class="panel" id="panel">
    <div class="empty-pane" id="empty-pane">
      Pick a conversation, or search for a user above to start chatting.
    </div>
  </div>
</div>

<script>
  const ME = {{ user_id }};
  let activeUserId = null;
  let activeUsername = null;
  let conversations = [];
  let messages = [];
  let lastMsgId = 0;

  // ── Conversations list ──────────────────────────────────────────────────
  async function loadConvos() {
    const r = await fetch('/api/messages/conversations');
    conversations = await r.json();
    renderConvos();
  }

  function renderConvos() {
    const el = document.getElementById('convo-list');
    if (!conversations.length) {
      el.innerHTML = '<div class="empty-pane" style="padding: 30px 20px">No conversations yet.<br>Search for a user to start.</div>';
      return;
    }
    el.innerHTML = conversations.map(c => `
      <div class="convo ${c.user_id === activeUserId ? 'active' : ''}" onclick="openChat(${c.user_id}, '${escapeJs(c.username)}')">
        <div class="avatar">${c.username[0].toUpperCase()}</div>
        <div class="convo-meta">
          <div class="convo-name">
            <span>${escapeHtml(c.username)}</span>
            ${c.unread > 0 ? `<span class="unread-dot">${c.unread}</span>` : `<span class="convo-time">${shortTime(c.timestamp)}</span>`}
          </div>
          <div class="convo-preview">${c.from_me ? 'You: ' : ''}${escapeHtml(c.preview)}</div>
        </div>
      </div>
    `).join('');
  }

  // ── Open chat ───────────────────────────────────────────────────────────
  async function openChat(userId, username) {
    activeUserId = userId;
    activeUsername = username;
    lastMsgId = 0;
    renderConvos();

    document.body.classList.add('chat-open');
    document.getElementById('panel').innerHTML = `
      <div class="panel-header">
        <button class="btn-sm back-btn" onclick="closeChat()" aria-label="Back" style="display:none">←</button>
        <div class="avatar">${username[0].toUpperCase()}</div>
        <div>
          <div style="font-weight:700">${escapeHtml(username)}</div>
          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:2px">
            <a href="/trades" class="btn-sm">🤝 Trades</a>
            <a href="/profile/${userId}" style="font-size:.78rem">View profile →</a>
          </div>
        </div>
      </div>
      <div class="messages" id="messages"></div>
      <div class="composer">
        <input id="composer" type="text" placeholder="Type a message…" maxlength="1000"
               onkeydown="if(event.key==='Enter')sendMsg()"/>
        <button onclick="sendMsg()" id="send-btn">Send</button>
      </div>
    `;
    if (window.matchMedia('(max-width: 720px)').matches) {
      document.querySelector('.back-btn').style.display = 'inline-block';
    }
    await loadMessages();
    document.getElementById('composer').focus();
  }

  function closeChat() {
    activeUserId = null;
    activeUsername = null;
    document.body.classList.remove('chat-open');
    document.getElementById('panel').innerHTML = `
      <div class="empty-pane" id="empty-pane">
        Pick a conversation, or search for a user above to start chatting.
      </div>
    `;
    renderConvos();
  }

  async function loadMessages() {
    if (!activeUserId) return;
    const r = await fetch('/api/messages/' + activeUserId);
    const newMsgs = await r.json();
    if (newMsgs.length === 0) {
      const el = document.getElementById('messages');
      if (el && !el.children.length) el.innerHTML = '<div class="empty-pane" style="padding:0">No messages yet — say hi 👋</div>';
      return;
    }
    const lastIncoming = newMsgs[newMsgs.length - 1].id;
    if (lastIncoming === lastMsgId) return;
    lastMsgId = lastIncoming;
    messages = newMsgs;
    renderMessages();
  }

  function renderMessages() {
    const el = document.getElementById('messages');
    if (!el) return;
    const wasAtBottom = el.scrollTop + el.clientHeight + 50 >= el.scrollHeight;
    el.innerHTML = messages.map(m => {
      const me = m.sender_id === ME;
      return `<div class="msg ${me?'me':'them'}">${escapeHtml(m.content)}</div>
              <div class="msg-time ${me?'me':'them'}">${shortTime(m.timestamp)}</div>`;
    }).join('');
    if (wasAtBottom) el.scrollTop = el.scrollHeight;
  }

  async function sendMsg() {
    const inp = document.getElementById('composer');
    const content = inp.value.trim();
    if (!content || !activeUserId) return;
    const btn = document.getElementById('send-btn');
    btn.disabled = true;
    inp.value = '';
    const r = await fetch('/api/messages/send', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ recipient_id: activeUserId, content }),
    });
    btn.disabled = false;
    if (!r.ok) {
      const d = await r.json();
      alert(d.error || 'Failed to send');
      inp.value = content;
      return;
    }
    await loadMessages();
    await loadConvos();
    inp.focus();
  }

  // ── User search ─────────────────────────────────────────────────────────
  let searchTimer;
  document.getElementById('user-search').addEventListener('input', e => {
    clearTimeout(searchTimer);
    const q = e.target.value.trim();
    if (!q) { document.getElementById('search-results').classList.remove('open'); return; }
    searchTimer = setTimeout(() => searchUsers(q), 250);
  });

  async function searchUsers(q) {
    const r = await fetch('/api/users/search?q=' + encodeURIComponent(q));
    const users = await r.json();
    const box = document.getElementById('search-results');
    if (!users.length) { box.innerHTML = '<div style="color:#64748b">No users found</div>'; box.classList.add('open'); return; }
    box.innerHTML = users.map(u => `<div onclick="pickUser(${u.id}, '${escapeJs(u.username)}')">${escapeHtml(u.username)} <small style="color:#64748b">#${u.id}</small></div>`).join('');
    box.classList.add('open');
  }

  function pickUser(uid, uname) {
    document.getElementById('user-search').value = '';
    document.getElementById('search-results').classList.remove('open');
    openChat(uid, uname);
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-row')) document.getElementById('search-results').classList.remove('open');
  });

  // ── Helpers ─────────────────────────────────────────────────────────────
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function escapeJs(s)   { return String(s).replace(/['\\]/g, '\\$&'); }
  function shortTime(ts) {
    if (!ts) return '';
    const d = new Date(ts.replace(' ', 'T') + 'Z');
    if (isNaN(d)) return '';
    const now = new Date();
    if (d.toDateString() === now.toDateString())
      return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    return d.toLocaleDateString([], {month:'short', day:'numeric'});
  }

  async function logout() { await fetch('/api/logout', {method:'POST'}); window.location.href='/login'; }

  // ── Auto-open from query ?to=USER_ID ────────────────────────────────────
  (async () => {
    await loadConvos();
    const params = new URLSearchParams(location.search);
    const to = params.get('to');
    if (to) {
      const r = await fetch('/api/profile/' + to);
      if (r.ok) { const u = await r.json(); openChat(u.id, u.username); }
    }
  })();

  // ── Polling ─────────────────────────────────────────────────────────────
  setInterval(async () => {
    await loadConvos();
    if (activeUserId) await loadMessages();
  }, 4000);
</script>
</body>
</html>
