<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Post · The Exchange Hub</title>
  <link rel="stylesheet" href="/static/responsive.css"/>
  <link rel="stylesheet" href="/static/shell.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#0a0b10;color:#e7eaf3;min-height:100vh}
    .wrap{max-width:620px;margin:0 auto;padding:24px 16px}
    .crumb{font-size:.85rem;color:#94a3b8;margin-bottom:14px}
    .crumb a{color:#7c85ff;text-decoration:none}
    .post{background:#11131c;border:1px solid #2a2e40;border-radius:14px;overflow:hidden}
    .post-head{display:flex;gap:12px;align-items:center;padding:14px 18px}
    .avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#7c85ff,#a855f7);
            display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;overflow:hidden}
    .avatar img{width:100%;height:100%;object-fit:cover}
    .post-meta{flex:1;min-width:0}
    .post-meta .who a{color:#e7eaf3;font-weight:700;text-decoration:none}
    .post-meta .when{font-size:.74rem;color:#64748b;margin-top:2px}
    .privacy-pill{font-size:.62rem;background:#1a1d27;color:#94a3b8;padding:2px 7px;border-radius:5px;
                  border:1px solid #2a2e40;text-transform:capitalize}
    .post-body{padding:0 18px 14px;font-size:1rem;color:#e7eaf3;white-space:pre-wrap;word-break:break-word}
    .post-link{display:block;margin:0 18px 14px;padding:10px 12px;background:#0a0b10;border:1px solid #2a2e40;
               border-radius:8px;color:#7dd3fc;font-size:.86rem;text-decoration:none;word-break:break-all}
    .post-media{width:100%;display:block;background:#000;max-height:80vh;object-fit:contain}
    .post-embed{margin:0 18px 14px;border-radius:10px;overflow:hidden;background:#000;border:1px solid #2a2e40}
    .post-embed.iframe{position:relative;width:auto;padding-top:56.25%}
    .post-embed.iframe iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
    .post-embed.video video{width:100%;display:block;background:#000;max-height:80vh}
    .post-media-file{margin:0 18px 14px;padding:12px;background:#0a0b10;border:1px solid #2a2e40;
                     border-radius:8px;color:#cbd5e1}
    .post-media-file a{color:#7dd3fc;text-decoration:none;font-weight:600}
    .post-foot{padding:10px 14px;border-top:1px solid #2a2e40;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
    .post-foot button{flex:1;background:transparent;border:none;color:#94a3b8;font-size:.88rem;
                      font-weight:600;cursor:pointer;padding:9px;border-radius:7px;min-width:90px}
    .post-foot button:hover{background:#0a0b10;color:#e7eaf3}
    .post-foot .liked{color:#ec4899}

    /* Comments */
    .card{background:#11131c;border:1px solid #2a2e40;border-radius:14px;margin-top:14px;overflow:hidden}
    .card h3{padding:14px 18px;font-size:.95rem;color:#e7eaf3;border-bottom:1px solid #2a2e40}
    .card .body{padding:6px 0}
    .c-row{display:flex;gap:10px;padding:10px 16px;border-bottom:1px solid #1a1d27}
    .c-row:last-child{border-bottom:none}
    .c-row .ava{width:34px;height:34px;border-radius:50%;background:#2a2e40;
                display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;
                overflow:hidden;flex-shrink:0}
    .c-row .ava img{width:100%;height:100%;object-fit:cover}
    .c-row .who{font-weight:700;font-size:.82rem;color:#e7eaf3}
    .c-row .who a{color:inherit;text-decoration:none}
    .c-row .txt{color:#cbd5e1;font-size:.92rem;word-break:break-word}
    .c-row .when{color:#64748b;font-size:.7rem;margin-top:2px}
    .c-row .del{background:transparent;border:none;color:#64748b;cursor:pointer;font-size:1.05rem;align-self:flex-start}
    .c-row .del:hover{color:#ef4444}
    .composer{display:flex;gap:8px;padding:12px;border-top:1px solid #2a2e40;background:#0a0b10}
    .composer input{flex:1;background:#1a1d27;color:#fff;border:1px solid #2a2e40;
                    padding:10px 14px;border-radius:24px;outline:none;font-size:.92rem}
    .composer button{background:#7c85ff;color:#fff;border:none;padding:10px 18px;
                     border-radius:24px;font-weight:700;cursor:pointer}
    .empty{color:#64748b;text-align:center;padding:32px;font-size:.95rem;background:#11131c;
           border:1px solid #2a2e40;border-radius:14px}
    .v-row{display:flex;gap:10px;padding:8px 16px;align-items:center;border-bottom:1px solid #1a1d27}
    .v-row:last-child{border-bottom:none}
    .v-row .ava{width:30px;height:30px}
    .v-row a{color:#e7eaf3;text-decoration:none;font-size:.86rem;font-weight:600;flex:1;
             overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .v-row .when{color:#64748b;font-size:.7rem}
    @media (max-width:640px){
      .wrap{padding:16px 10px}
      .post-foot button{min-width:0;flex:1 1 30%;font-size:.82rem}
    }
  </style>
</head>
<body>
{% include "_nav.html" %}

<div class="wrap">
  <div class="crumb"><a href="/">← Back to home</a></div>
  <div id="root"><div class="empty">Loading…</div></div>

  <div class="card" id="comments-card" style="display:none">
    <h3 id="comments-title">Comments</h3>
    <div class="body" id="comments-body"></div>
    <div class="composer">
      <input id="c-input" placeholder="Add a comment…" maxlength="1000"/>
      <button onclick="postComment()">Post</button>
    </div>
  </div>

  <div class="card" id="viewers-card" style="display:none">
    <h3 id="viewers-title">Seen by</h3>
    <div class="body" id="viewers-body"></div>
  </div>
</div>

<div class="app-toast" id="toast"></div>

<script>
const PID = {{ post_id }};
const ME = {{ user_id }};
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}
function escapeAttr(s){return String(s||'').replace(/["'<>&]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}

/* Auto-embed any recognised video URL inside a post. Kept in sync with the
   detectors in templates/home.html and templates/reels.html. */
function detectVideoEmbed(url){
  if (!url) return null;
  let u; try { u = new URL(url); } catch (e) { return null; }
  const host = u.hostname.replace(/^www\./, '').toLowerCase();
  const path = u.pathname;
  const parent = location.hostname;
  // YouTube
  if (host === 'youtu.be') {
    const id = path.slice(1).split('/')[0];
    if (id) return { kind:'iframe', src:`https://www.youtube.com/embed/${encodeURIComponent(id)}` };
  }
  if (host === 'youtube.com' || host === 'm.youtube.com' || host === 'youtube-nocookie.com') {
    let id = u.searchParams.get('v');
    if (!id) { const m = path.match(/^\/(embed|shorts|v|live)\/([^\/?#]+)/); if (m) id = m[2]; }
    if (id) return { kind:'iframe', src:`https://www.youtube.com/embed/${encodeURIComponent(id)}` };
  }
  // Vimeo
  if (host === 'vimeo.com' || host === 'player.vimeo.com') {
    const m = path.match(/(\d+)/);
    if (m) return { kind:'iframe', src:`https://player.vimeo.com/video/${m[1]}` };
  }
  // TikTok
  if (host === 'tiktok.com' || host === 'vm.tiktok.com' || host === 'm.tiktok.com') {
    const m = path.match(/\/video\/(\d+)/);
    if (m) return { kind:'iframe', src:`https://www.tiktok.com/embed/v2/${m[1]}` };
  }
  // Dailymotion
  if (host === 'dailymotion.com' || host === 'dai.ly') {
    const m = path.match(/(?:\/video\/|^\/)([a-zA-Z0-9]+)/);
    if (m) return { kind:'iframe', src:`https://www.dailymotion.com/embed/video/${m[1]}` };
  }
  // Twitch
  if (host === 'twitch.tv' || host === 'clips.twitch.tv') {
    const v = path.match(/\/videos\/(\d+)/);
    if (v) return { kind:'iframe', src:`https://player.twitch.tv/?video=${v[1]}&parent=${parent}` };
    const c = path.match(/\/clip\/([^/?#]+)/) || path.match(/^\/([^/?#]+)$/);
    if (c && host === 'clips.twitch.tv') return { kind:'iframe', src:`https://clips.twitch.tv/embed?clip=${c[1]}&parent=${parent}` };
  }
  // Streamable
  if (host === 'streamable.com') {
    const m = path.match(/^\/([a-zA-Z0-9]+)/);
    if (m) return { kind:'iframe', src:`https://streamable.com/e/${m[1]}` };
  }
  // Facebook video
  if (host === 'facebook.com' || host === 'm.facebook.com' || host === 'fb.watch') {
    return { kind:'iframe', src:`https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(url)}&show_text=false` };
  }
  // Bilibili
  if (host === 'bilibili.com' || host === 'm.bilibili.com') {
    const m = path.match(/\/video\/(BV[0-9A-Za-z]+|av\d+)/);
    if (m) return { kind:'iframe', src:`https://player.bilibili.com/player.html?bvid=${m[1]}` };
  }
  // Raw video file
  if (/\.(mp4|webm|mov|m4v|ogv|mkv)(\?|#|$)/i.test(path + u.search)) {
    return { kind:'video', src:url };
  }
  return null;
}
function renderLinkOrEmbed(url){
  const safeLink = `<a class="post-link" href="${escapeAttr(url)}" target="_blank" rel="noreferrer">🔗 ${escapeHtml(url)}</a>`;
  const e = detectVideoEmbed(url);
  if (!e) return safeLink;
  if (e.kind === 'iframe') {
    return `<div class="post-embed iframe">
      <iframe src="${escapeAttr(e.src)}" loading="lazy"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
    </div>${safeLink}`;
  }
  return `<div class="post-embed video">
    <video src="${escapeAttr(e.src)}" controls preload="metadata" playsinline></video>
  </div>${safeLink}`;
}
function shortTime(ts){if(!ts)return'';try{const d=new Date(ts.replace(' ','T')+'Z');const diff=(Date.now()-d.getTime())/1000;
  if(diff<60)return 'just now';if(diff<3600)return Math.floor(diff/60)+'m ago';if(diff<86400)return Math.floor(diff/3600)+'h ago';
  return d.toLocaleDateString();}catch(e){return ts;}}
function toast(msg, ok){const t=document.getElementById('toast');t.textContent=msg;t.className='app-toast show '+(ok?'ok':'err');setTimeout(()=>t.classList.remove('show'),2400);}

let CURRENT_POST = null;

async function load() {
  try {
    const r = await fetch('/api/posts/' + PID);
    if (!r.ok) {
      const d = await r.json().catch(()=>({}));
      document.getElementById('root').innerHTML = '<div class="empty">'+escapeHtml(d.error||'Not found')+'</div>';
      return;
    }
    const p = await r.json();
    CURRENT_POST = p;
    let media = '';
    if (p.file) {
      if (p.file.kind === 'image') media = `<img class="post-media" src="/api/files/${p.file.id}/download"/>`;
      else if (p.file.kind === 'video') media = `<video class="post-media" src="/api/files/${p.file.id}/download" controls playsinline></video>`;
      else media = `<div class="post-media-file">📎 <a href="/api/files/${p.file.id}/download" target="_blank">${escapeHtml(p.file.display_name)}</a></div>`;
    }
    const ava = p.avatar_url ? `<img src="${escapeHtml(p.avatar_url)}"/>` : escapeHtml((p.username||'?')[0].toUpperCase());
    const link = p.link_url ? renderLinkOrEmbed(p.link_url) : '';
    document.getElementById('root').innerHTML = `<div class="post">
      <div class="post-head">
        <div class="avatar">${ava}</div>
        <div class="post-meta">
          <div class="who"><a href="/profile/${p.user_id}">${escapeHtml(p.username)}</a></div>
          <div class="when">${shortTime(p.created_at)} · <span class="privacy-pill">${escapeHtml(p.privacy)}</span></div>
        </div>
      </div>
      ${p.content ? `<div class="post-body">${escapeHtml(p.content)}</div>` : ''}
      ${link}${media}
      <div class="post-foot">
        <button class="${p.liked?'liked':''}" id="like-btn">${p.liked?'♥':'♡'} <span id="likes">${p.likes}</span></button>
        <button onclick="document.getElementById('c-input').focus()">💬 <span id="cnt">${p.comments||0}</span></button>
        ${p.mine ? `<button onclick="loadViewers()">👁 <span id="vcnt">${p.views||0}</span> seen by</button>` : ''}
        <button onclick="location='/profile/${p.user_id}'">👤 Profile</button>
      </div>
    </div>`;
    // Mark as seen.
    if (p.user_id !== ME) {
      fetch(`/api/posts/${PID}/view`, { method:'POST' }).catch(()=>{});
    }
    document.getElementById('like-btn').onclick = async () => {
      const liked = document.getElementById('like-btn').classList.contains('liked');
      try {
        const j = liked
          ? await (await fetch('/api/posts/'+PID+'/like',{method:'DELETE'})).json()
          : await (await fetch('/api/posts/'+PID+'/like',{method:'POST'})).json();
        document.getElementById('like-btn').classList.toggle('liked', j.liked);
        document.getElementById('like-btn').innerHTML = (j.liked?'♥':'♡')+' <span id="likes">'+j.likes+'</span>';
      } catch(e){ toast('Like failed', false); }
    };
    loadComments();
    if (p.mine && location.hash === '#viewers') loadViewers();
    if (location.hash === '#comments') {
      setTimeout(() => document.getElementById('c-input').focus(), 200);
    }
  } catch(e) {
    document.getElementById('root').innerHTML = '<div class="empty">Could not load post.</div>';
  }
}

async function loadComments() {
  const card = document.getElementById('comments-card');
  card.style.display = '';
  const body = document.getElementById('comments-body');
  body.innerHTML = '<div style="color:#64748b;padding:14px 18px">Loading…</div>';
  try {
    const r = await fetch(`/api/posts/${PID}/comments`);
    const arr = r.ok ? await r.json() : [];
    document.getElementById('comments-title').textContent =
      'Comments' + (arr.length ? ' (' + arr.length + ')' : '');
    const cnt = document.getElementById('cnt');
    if (cnt) cnt.textContent = arr.length;
    if (!arr.length) {
      body.innerHTML = '<div style="color:#64748b;padding:18px;text-align:center">No comments yet. Be the first.</div>';
      return;
    }
    body.innerHTML = arr.map(c => `
      <div class="c-row" data-cid="${c.id}">
        <a href="/profile/${c.user_id}" class="ava">
          ${c.avatar_url ? `<img src="${escapeHtml(c.avatar_url)}">`
                         : escapeHtml((c.username||'?')[0].toUpperCase())}
        </a>
        <div style="flex:1;min-width:0">
          <div class="who"><a href="/profile/${c.user_id}">@${escapeHtml(c.username)}</a></div>
          <div class="txt">${escapeHtml(c.content)}</div>
          <div class="when">${shortTime(c.created_at)}</div>
        </div>
        ${c.can_delete ? `<button class="del" onclick="delComment(${c.id})" title="Delete">×</button>` : ''}
      </div>`).join('');
  } catch (e) {
    body.innerHTML = '<div style="color:#ef4444;padding:14px 18px">Could not load comments.</div>';
  }
}

async function postComment() {
  const inp = document.getElementById('c-input');
  const v = inp.value.trim();
  if (!v) return;
  inp.disabled = true;
  try {
    const r = await fetch(`/api/posts/${PID}/comments`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ content: v }),
    });
    if (r.ok) { inp.value = ''; loadComments(); }
    else {
      const d = await r.json().catch(()=>({}));
      toast(d.error || 'Failed to post', false);
    }
  } finally { inp.disabled = false; inp.focus(); }
}

async function delComment(cid) {
  if (!confirm('Delete this comment?')) return;
  const r = await fetch(`/api/comments/${cid}`, { method:'DELETE' });
  if (r.ok) loadComments();
}

async function loadViewers() {
  const card = document.getElementById('viewers-card');
  card.style.display = '';
  const body = document.getElementById('viewers-body');
  body.innerHTML = '<div style="color:#64748b;padding:14px 18px">Loading…</div>';
  card.scrollIntoView({ behavior:'smooth', block:'start' });
  try {
    const r = await fetch(`/api/posts/${PID}/viewers`);
    if (!r.ok) {
      body.innerHTML = '<div style="color:#ef4444;padding:14px 18px">Could not load.</div>';
      return;
    }
    const arr = await r.json();
    document.getElementById('viewers-title').textContent = 'Seen by ' + arr.length;
    if (!arr.length) {
      body.innerHTML = '<div style="color:#64748b;padding:18px;text-align:center">Nobody has seen this yet.</div>';
      return;
    }
    body.innerHTML = arr.map(v => `
      <div class="v-row">
        <div class="ava avatar">
          ${v.avatar_url ? `<img src="${escapeHtml(v.avatar_url)}">`
                         : escapeHtml((v.username||'?')[0].toUpperCase())}
        </div>
        <a href="/profile/${v.user_id}">@${escapeHtml(v.username)}</a>
        <span class="when">${shortTime(v.viewed_at)}</span>
      </div>`).join('');
  } catch (e) {
    body.innerHTML = '<div style="color:#ef4444;padding:14px 18px">Could not load.</div>';
  }
}

document.getElementById('c-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); postComment(); }
});

load();
</script>
</body>
</html>
