<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paper Trading</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.3rem; font-weight: 700; color: #7c85ff; letter-spacing: -0.5px; }
    header .cash { font-size: 1rem; color: #94a3b8; }
    header .cash span { color: #38bdf8; font-weight: 600; }

    .container { max-width: 1100px; margin: 0 auto; padding: 28px 24px; display: grid; gap: 24px; }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 22px 24px;
    }
    .card h2 { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; margin-bottom: 18px; }

    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; }
    .stat { background: #13151f; border-radius: 8px; padding: 16px; }
    .stat .label { font-size: 0.75rem; color: #64748b; margin-bottom: 6px; }
    .stat .value { font-size: 1.4rem; font-weight: 700; }
    .stat .value.green { color: #4ade80; }
    .stat .value.red   { color: #f87171; }
    .stat .value.blue  { color: #38bdf8; }
    .stat .value.white { color: #f1f5f9; }

    .trade-form { display: grid; grid-template-columns: 1fr 1fr 1fr auto auto; gap: 12px; align-items: end; }
    label { font-size: 0.78rem; color: #94a3b8; display: block; margin-bottom: 5px; }
    input[type="text"], input[type="number"] {
      width: 100%;
      background: #13151f;
      border: 1px solid #2d3148;
      border-radius: 7px;
      color: #e2e8f0;
      padding: 9px 12px;
      font-size: 0.92rem;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: #7c85ff; }

    button {
      padding: 9px 20px;
      border: none;
      border-radius: 7px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    button:hover { opacity: 0.85; }
    .btn-buy  { background: #16a34a; color: #fff; }
    .btn-sell { background: #dc2626; color: #fff; }
    .btn-quote { background: #2563eb; color: #fff; }
    .btn-reset { background: #374151; color: #94a3b8; font-size: 0.8rem; padding: 6px 14px; border-radius: 6px; }

    .quote-result { margin-top: 10px; font-size: 0.9rem; color: #94a3b8; min-height: 1.2em; }
    .quote-result .price { color: #38bdf8; font-weight: 600; }

    .toast {
      position: fixed; bottom: 28px; right: 28px;
      background: #1e2130; border: 1px solid #2d3148;
      border-radius: 9px; padding: 14px 20px;
      max-width: 340px; font-size: 0.88rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      opacity: 0; transform: translateY(12px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.ok  { border-left: 3px solid #4ade80; }
    .toast.err { border-left: 3px solid #f87171; }

    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th { text-align: left; padding: 8px 12px; font-size: 0.75rem; color: #64748b; font-weight: 500; border-bottom: 1px solid #2d3148; }
    td { padding: 10px 12px; border-bottom: 1px solid #1e2130; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    .badge.BUY  { background: #14532d; color: #4ade80; }
    .badge.SELL { background: #450a0a; color: #f87171; }

    .top-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 700px) {
      .top-row { grid-template-columns: 1fr; }
      .trade-form { grid-template-columns: 1fr 1fr; }
      .trade-form > :nth-child(3) { grid-column: 1 / -1; }
    }
    .empty { color: #475569; font-size: 0.85rem; padding: 16px 0; }

    .header-right { display: flex; align-items: center; gap: 16px; }
  </style>
</head>
<body>

<header>
  <h1>📈 Paper Trading</h1>
  <div class="header-right">
    <div class="cash">Cash: <span id="hdr-cash">—</span></div>
    <button class="btn-reset" onclick="resetPortfolio()">Reset Portfolio</button>
  </div>
</header>

<div class="container">

  <!-- Stats -->
  <div class="card">
    <h2>Overview</h2>
    <div class="stats">
      <div class="stat">
        <div class="label">Cash Available</div>
        <div class="value blue" id="stat-cash">—</div>
      </div>
      <div class="stat">
        <div class="label">Portfolio Value</div>
        <div class="value white" id="stat-total">—</div>
      </div>
      <div class="stat">
        <div class="label">P&amp;L</div>
        <div class="value" id="stat-pnl">—</div>
      </div>
      <div class="stat">
        <div class="label">Starting Capital</div>
        <div class="value white">$100,000.00</div>
      </div>
    </div>
  </div>

  <!-- Trade + Quote -->
  <div class="card">
    <h2>Trade</h2>
    <div class="trade-form">
      <div>
        <label>Ticker</label>
        <input id="ticker" type="text" placeholder="e.g. AAPL" />
      </div>
      <div>
        <label>Shares</label>
        <input id="shares" type="number" min="0.0001" step="any" placeholder="e.g. 5" />
      </div>
      <div>
        <label>Quote price</label>
        <input id="quote-price" type="text" readonly placeholder="Fetch quote first" style="opacity:.6;cursor:default;" />
      </div>
      <div>
        <label>&nbsp;</label>
        <button class="btn-quote" onclick="fetchQuote()">Get Quote</button>
      </div>
      <div style="display:flex;gap:8px;align-items:flex-end;">
        <div>
          <label>&nbsp;</label>
          <button class="btn-buy" onclick="trade('buy')">Buy</button>
        </div>
        <div>
          <label>&nbsp;</label>
          <button class="btn-sell" onclick="trade('sell')">Sell</button>
        </div>
      </div>
    </div>
  </div>

  <div class="top-row">
    <!-- Holdings -->
    <div class="card">
      <h2>Holdings</h2>
      <table>
        <thead>
          <tr><th>Ticker</th><th>Shares</th><th>Price</th><th>Value</th></tr>
        </thead>
        <tbody id="holdings-body">
          <tr><td colspan="4" class="empty">No positions yet.</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Trade History -->
    <div class="card">
      <h2>Trade History</h2>
      <table>
        <thead>
          <tr><th>Time</th><th>Action</th><th>Ticker</th><th>Shares</th><th>Price</th><th>Total</th></tr>
        </thead>
        <tbody id="trades-body">
          <tr><td colspan="6" class="empty">No trades yet.</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const fmt = (n) => '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  async function loadPortfolio() {
    const r = await fetch('/api/portfolio');
    const d = await r.json();

    document.getElementById('hdr-cash').textContent = fmt(d.cash);
    document.getElementById('stat-cash').textContent = fmt(d.cash);
    document.getElementById('stat-total').textContent = fmt(d.total_value);

    const pnlEl = document.getElementById('stat-pnl');
    const pnl = d.pnl;
    pnlEl.textContent = (pnl >= 0 ? '+' : '') + fmt(pnl);
    pnlEl.className = 'value ' + (pnl >= 0 ? 'green' : 'red');

    const tbody = document.getElementById('holdings-body');
    if (d.holdings.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty">No positions yet.</td></tr>';
    } else {
      tbody.innerHTML = d.holdings.map(h => `
        <tr>
          <td style="font-weight:600;color:#7c85ff">${h.ticker}</td>
          <td>${Number(h.shares).toLocaleString()}</td>
          <td>${fmt(h.price)}</td>
          <td>${fmt(h.value)}</td>
        </tr>
      `).join('');
    }
  }

  async function loadTrades() {
    const r = await fetch('/api/trades');
    const d = await r.json();
    const tbody = document.getElementById('trades-body');
    if (d.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">No trades yet.</td></tr>';
    } else {
      tbody.innerHTML = d.map(t => `
        <tr>
          <td style="color:#64748b;font-size:.8rem">${t.timestamp.slice(0,16)}</td>
          <td><span class="badge ${t.action}">${t.action}</span></td>
          <td style="color:#7c85ff;font-weight:600">${t.ticker}</td>
          <td>${Number(t.shares).toLocaleString()}</td>
          <td>${fmt(t.price)}</td>
          <td>${fmt(t.total)}</td>
        </tr>
      `).join('');
    }
  }

  async function fetchQuote() {
    const ticker = document.getElementById('ticker').value.trim().toUpperCase();
    if (!ticker) { showToast('Enter a ticker first.', false); return; }
    const r = await fetch(`/api/quote/${ticker}`);
    const d = await r.json();
    if (r.ok) {
      document.getElementById('quote-price').value = d.price;
      showToast(`${d.ticker}: ${fmt(d.price)}`, true);
    } else {
      showToast(d.error || 'Ticker not found.', false);
    }
  }

  async function trade(action) {
    const ticker = document.getElementById('ticker').value.trim().toUpperCase();
    const shares = parseFloat(document.getElementById('shares').value);
    if (!ticker || !shares || shares <= 0) { showToast('Enter a valid ticker and number of shares.', false); return; }

    const r = await fetch(`/api/${action}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticker, shares }),
    });
    const d = await r.json();

    showToast(d.message || d.error, r.ok);
    if (r.ok) {
      loadPortfolio();
      loadTrades();
    }
  }

  async function resetPortfolio() {
    if (!confirm('Reset your portfolio back to $100,000? All trades will be erased.')) return;
    const r = await fetch('/api/reset', { method: 'POST' });
    const d = await r.json();
    showToast(d.message, true);
    loadPortfolio();
    loadTrades();
  }

  let toastTimer;
  function showToast(msg, ok) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show ' + (ok ? 'ok' : 'err');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = 'toast'; }, 3500);
  }

  loadPortfolio();
  loadTrades();
  setInterval(() => { loadPortfolio(); loadTrades(); }, 30000);
</script>
</body>
</html>
