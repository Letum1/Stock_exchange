<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Notifications — PaperTrade</title>
  <link rel="stylesheet" href="/static/shell.css">
  <style>
    body { background:#0b1220; color:#e2e8f0; margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
    .wrap { max-width:680px; margin:24px auto; padding:0 16px; }
    .hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .hdr h1 { font-size:1.4rem; margin:0; }
    .hdr .actions { display:flex; gap:8px; }
    .hdr button {
      background:#1e293b; color:#cbd5e1; border:1px solid #334155;
      padding:8px 14px; border-radius:8px; font-weight:600; cursor:pointer; font-size:.85rem;
    }
    .hdr button:hover { background:#334155; }
    .hdr button.danger { color:#fca5a5; }

    .list {
      background:#0f172a; border:1px solid #1e293b; border-radius:14px; overflow:hidden;
    }
    .n {
      display:flex; gap:12px; align-items:center; padding:14px 16px;
      border-bottom:1px solid #1e293b; text-decoration:none; color:inherit;
      transition:background .15s;
    }
    .n:last-child { border-bottom:none; }
    .n:hover { background:#111c30; }
    .n.unread { background:#0f1c33; }
    .n.unread::before {
      content:''; width:8px; height:8px; border-radius:50%; background:#3b82f6;
      flex-shrink:0; margin-right:-4px;
    }
    .n .ava {
      width:46px; height:46px; border-radius:50%; background:#1e293b;
      display:flex; align-items:center; justify-content:center; font-weight:700;
      overflow:hidden; flex-shrink:0;
    }
    .n .ava img { width:100%; height:100%; object-fit:cover; }
    .n .body { flex:1; min-width:0; }
    .n .body .msg { font-size:.92rem; color:#e2e8f0; }
    .n .body .msg b { font-weight:700; }
    .n .body .when { font-size:.74rem; color:#64748b; margin-top:3px; }
    .n .icon { font-size:18px; opacity:.85; flex-shrink:0; }

    .empty { color:#64748b; text-align:center; padding:48px 16px; }
    .empty .big { font-size:48px; margin-bottom:8px; }
    @media (max-width:640px) {
      .wrap { margin:14px auto; }
      .hdr h1 { font-size:1.2rem; }
    }
  </style>
</head>
<body>
<div class="app-shell">
  {% include "_nav.html" %}
  <main class="app-main">
    <div class="wrap">
      <div class="hdr">
        <h1>🔔 Notifications</h1>
        <div class="actions">
          <button onclick="markAllRead()">Mark all read</button>
          <button class="danger" onclick="clearAll()">Clear</button>
        </div>
      </div>
      <div id="list" class="list">
        <div class="empty">Loading…</div>
      </div>
    </div>
  </main>
</div>
<script>
function escapeHtml(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function shortTime(ts){if(!ts)return'';try{const d=new Date(ts.replace(' ','T')+'Z');const diff=(Date.now()-d.getTime())/1000;
  if(diff<60)return 'just now';if(diff<3600)return Math.floor(diff/60)+'m ago';if(diff<86400)return Math.floor(diff/3600)+'h ago';
  if(diff<604800)return Math.floor(diff/86400)+'d ago';return d.toLocaleDateString();}catch(e){return ts;}}

function lineFor(n) {
  const who = `<b>@${escapeHtml(n.actor_name)}</b>`;
  switch (n.kind) {
    case 'like':            return `${who} liked your post.`;
    case 'comment':         return `${who} commented on your post.`;
    case 'follow':          return `${who} started following you.`;
    case 'follow_request':  return `${who} requested to follow you.`;
    case 'follow_accepted': return `${who} accepted your follow request.`;
    default:                return `${who} did something.`;
  }
}
function iconFor(kind) {
  return ({like:'❤️', comment:'💬', follow:'👤',
           follow_request:'📨', follow_accepted:'✅'})[kind] || '🔔';
}
function linkFor(n) {
  if (n.post_id) return '/post/' + n.post_id;
  if (n.kind === 'follow_request') return '/follow_requests';
  return '/profile/' + n.actor_id;
}

async function load() {
  const list = document.getElementById('list');
  try {
    const r = await fetch('/api/notifications');
    if (!r.ok) { list.innerHTML = '<div class="empty">Could not load.</div>'; return; }
    const arr = await r.json();
    if (!arr.length) {
      list.innerHTML = `
        <div class="empty">
          <div class="big">🔔</div>
          No notifications yet. Likes, comments, and new followers will show up here.
        </div>`;
      return;
    }
    list.innerHTML = arr.map(n => `
      <a href="${linkFor(n)}" class="n ${n.read_at ? '' : 'unread'}"
         data-id="${n.id}" onclick="markRead(${n.id})">
        <a href="/profile/${n.actor_id}" class="ava" onclick="event.stopPropagation()">
          ${n.actor_avatar
            ? `<img src="${escapeHtml(n.actor_avatar)}" alt="">`
            : escapeHtml((n.actor_name||'?')[0].toUpperCase())}
        </a>
        <div class="body">
          <div class="msg">${lineFor(n)}</div>
          <div class="when">${shortTime(n.created_at)}</div>
        </div>
        <div class="icon">${iconFor(n.kind)}</div>
      </a>`).join('');
  } catch (_) {
    list.innerHTML = '<div class="empty">Could not load.</div>';
  }
}

async function markRead(id) {
  try { await fetch('/api/notifications/' + id + '/read', { method:'POST' }); }
  catch (_) {}
}
async function markAllRead() {
  await fetch('/api/notifications/read', { method:'POST' });
  load();
}
async function clearAll() {
  if (!confirm('Clear all notifications? This cannot be undone.')) return;
  await fetch('/api/notifications/clear', { method:'POST' });
  load();
}

load();
// Auto-mark all as read once the page is open for a moment.
setTimeout(() => fetch('/api/notifications/read', { method:'POST' }).catch(()=>{}), 1500);
</script>
</body>
</html>
