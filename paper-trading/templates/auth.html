<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paper Trading — {{ 'Login' if mode == 'login' else 'Register' }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0;
           min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .box { background: #1a1d27; border: 1px solid #2d3148; border-radius: 14px;
           padding: 40px 36px; width: 100%; max-width: 400px; }
    .logo     { font-size: 1.5rem; font-weight: 800; color: #7c85ff; margin-bottom: 6px; }
    .subtitle { color: #64748b; font-size: 0.85rem; margin-bottom: 28px; }
    .tabs { display: flex; border: 1px solid #2d3148; border-radius: 8px; overflow: hidden; margin-bottom: 26px; }
    .tab { flex: 1; padding: 10px; text-align: center; font-size: 0.88rem; font-weight: 600;
           cursor: pointer; text-decoration: none; color: #64748b; background: transparent; transition: background .15s, color .15s; }
    .tab.active { background: #7c85ff; color: #fff; }
    label { font-size: 0.78rem; color: #94a3b8; display: block; margin-bottom: 5px; }
    input { width: 100%; background: #13151f; border: 1px solid #2d3148; border-radius: 7px;
            color: #e2e8f0; padding: 10px 13px; font-size: 0.93rem; outline: none;
            margin-bottom: 16px; transition: border-color .15s; }
    input:focus { border-color: #7c85ff; }
    button { width: 100%; padding: 11px; border: none; border-radius: 7px;
             font-size: 0.95rem; font-weight: 700; cursor: pointer; background: #7c85ff;
             color: #fff; transition: opacity .15s; margin-top: 4px; }
    button:hover { opacity: .85; }
    .alert { border-radius: 7px; padding: 10px 13px; font-size: 0.85rem; margin-bottom: 16px; display: none; }
    .alert.err  { background: #450a0a; border: 1px solid #7f1d1d; color: #fca5a5; }
    .alert.warn { background: #78350f; border: 1px solid #92400e; color: #fde68a; }

    .captcha-box {
      background: #13151f; border: 1px solid #2d3148; border-radius: 8px;
      padding: 14px 16px; margin-bottom: 16px;
    }
    .cap-row { display: flex; gap: 12px; align-items: center; }
    .cap-question {
      background: #0f1117; border: 1px solid #2d3148; border-radius: 6px;
      padding: 10px 16px; font-size: 1.15rem; font-weight: 800; color: #fcd34d;
      letter-spacing: .08em; min-width: 110px; text-align: center;
    }
    .cap-input { margin: 0 !important; flex: 1; }
    .cap-refresh {
      width: auto; padding: 9px 12px; margin: 0; background: #2d3148; color: #94a3b8;
      font-size: 0.78rem; border-radius: 6px;
    }
    .cap-label {
      font-size: 0.72rem; color: #64748b; text-transform: uppercase;
      letter-spacing: .07em; margin-bottom: 8px; font-weight: 700;
    }
  </style>
</head>
<body>
<div class="box">
  <div class="logo">📈 Paper Trading</div>
  <div class="subtitle">Start with $0 — funded by the admin</div>

  <div class="tabs">
    <a class="tab {% if mode == 'login' %}active{% endif %}" href="/login">Login</a>
    <a class="tab {% if mode == 'register' %}active{% endif %}" href="/register">Register</a>
  </div>

  {% if banned %}
  <div class="alert warn" style="display:block">
    ⚠️ Your account has been banned. Contact the admin.
  </div>
  {% endif %}

  <div class="alert err" id="err"></div>

  {% if mode == 'login' %}
  <form id="form">
    <label>Username</label>
    <input type="text"     id="username" placeholder="Your username" autocomplete="username" required/>
    <label>Password</label>
    <input type="password" id="password" placeholder="Your password" autocomplete="current-password" required/>
    <button type="submit">Login</button>
  </form>
  <script>
    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const r = await fetch('/api/login', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ username: document.getElementById('username').value.trim(), password: document.getElementById('password').value }),
      });
      const d = await r.json();
      if (r.ok) { window.location.href = d.is_admin ? '/admin' : '/'; }
      else       { const el = document.getElementById('err'); el.textContent = d.error; el.style.display = 'block'; }
    });
  </script>
  {% else %}
  <form id="form">
    <label>Username</label>
    <input type="text"     id="username"  placeholder="Choose a username (min 3 chars)" autocomplete="username" required/>
    <label>Password</label>
    <input type="password" id="password"  placeholder="At least 6 characters" autocomplete="new-password" required/>
    <label>Confirm Password</label>
    <input type="password" id="password2" placeholder="Repeat password" autocomplete="new-password" required/>

    <div class="captcha-box">
      <div class="cap-label">🤖 Prove you're human</div>
      <div class="cap-row">
        <div class="cap-question" id="cap-q">…</div>
        <span style="color:#64748b;font-weight:700">=</span>
        <input type="number" class="cap-input" id="captcha" placeholder="Answer" autocomplete="off" required/>
        <button type="button" class="cap-refresh" onclick="loadCaptcha()" title="New question">↻</button>
      </div>
    </div>

    <button type="submit">Create Account</button>
  </form>
  <script>
    async function loadCaptcha() {
      document.getElementById('cap-q').textContent = '…';
      document.getElementById('captcha').value = '';
      try {
        const r = await fetch('/api/captcha');
        const d = await r.json();
        document.getElementById('cap-q').textContent = d.question;
      } catch (e) {
        document.getElementById('cap-q').textContent = '?';
      }
    }
    loadCaptcha();

    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const pw  = document.getElementById('password').value;
      const pw2 = document.getElementById('password2').value;
      const err = document.getElementById('err');
      if (pw !== pw2) { err.textContent = 'Passwords do not match'; err.style.display = 'block'; return; }
      const r = await fetch('/api/register', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password: pw,
          captcha:  document.getElementById('captcha').value,
        }),
      });
      const d = await r.json();
      if (r.ok) { window.location.href = d.is_admin ? '/admin' : '/'; }
      else      { err.textContent = d.error; err.style.display = 'block'; loadCaptcha(); }
    });
  </script>
  {% endif %}
</div>
</body>
</html>
